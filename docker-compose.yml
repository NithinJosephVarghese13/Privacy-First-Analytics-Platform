services:
  postgres-timescale:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres-timescale
    container_name: analytics-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management
    container_name: analytics-rabbitmq
    build: 
      context: .
      dockerfile: docker/Dockerfile.rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "curl -fsu $$RABBITMQ_DEFAULT_USER:$$RABBITMQ_DEFAULT_PASS http://localhost:15672/api/health/checks/alarms >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: analytics-keycloak
    depends_on:
      postgres-timescale:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    command: start-dev
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000; printf 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q 'UP' <&3 || { exec 3>&-; exit 1; }; exec 3>&-"]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
    name: analytics_pgdata
  rabbitmq_data:
    name: analytics_rabbitmq_data