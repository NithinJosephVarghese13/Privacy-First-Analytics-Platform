services:
  postgres-timescale:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres-timescale
    container_name: analytics-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management
    container_name: analytics-rabbitmq
    build: 
      context: .
      dockerfile: docker/Dockerfile.rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "curl -fsu $$RABBITMQ_DEFAULT_USER:$$RABBITMQ_DEFAULT_PASS http://localhost:15672/api/health/checks/alarms >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: analytics-keycloak
    depends_on:
      postgres-timescale:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/analytics-realm-export.json:/opt/keycloak/data/import/analytics-realm-export.json
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/9000; printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q 'UP' <&3 || { exec 3>&-; exit 1; }; exec 3>&-"]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  # PrivacyAnalytics API. The durable-HMAC signing key and daily-salt seed are injected as Docker
  # SECRETS (file mounts under /run/secrets), not as environment variables and never as a DB
  # column (FR-2.1). Keeping the key out-of-band means a database compromise alone cannot
  # re-identify authenticated users.
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: analytics-api
    depends_on:
      postgres-timescale:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Authentication__Authority: "http://keycloak:8080/realms/analytics-platform"
      ConnectionStrings__AnalyticsDb: "Host=postgres-timescale;Port=5432;Database=analytics;Username=analytics_app;Password=analytics_dev"
      ConnectionStrings__RabbitMQ: "amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/"
      Identity__SecretsPath: "/run/secrets"
      Identity__AllowUnmanagedDevSecrets: "false"
    ports:
      - "5115:8080"
    secrets:
      - analytics_daily_salt_seed
      - analytics_durable_hmac_key
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: analytics-worker
    depends_on:
      postgres-timescale:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__AnalyticsDb: "Host=postgres-timescale;Port=5432;Database=analytics;Username=analytics_app;Password=analytics_dev"
      ConnectionStrings__RabbitMQ: "amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/"
      Identity__SecretsPath: "/run/secrets"
      Identity__AllowUnmanagedDevSecrets: "false"
    secrets:
      - analytics_daily_salt_seed
      - analytics_durable_hmac_key
    restart: unless-stopped

volumes:
  pgdata:
    name: analytics_pgdata
  rabbitmq_data:
    name: analytics_rabbitmq_data

# Named Docker secrets. `file:` points at a host path; compose mounts the file content read-only
# into each service that declares it under `secrets:`. The files themselves are gitignored (see
# .gitignore) and produced by docker/secrets/generate-secrets.sh. In a hosted deployment replace
# `file:` with an external/managed secret of the same name.
secrets:
  analytics_daily_salt_seed:
    file: ./docker/secrets/analytics_daily_salt_seed
  analytics_durable_hmac_key:
    file: ./docker/secrets/analytics_durable_hmac_key